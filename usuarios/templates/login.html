{% extends "global/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="justify-content:center; max-width:420px; margin-top:110px;">
  <div style="width:100%;">
    <h1 style="text-align:center; margin-bottom:6px; font-size:1.4rem;">Entrar</h1>
    <p style="text-align:center; color:#3f5a47; font-size:0.9rem; margin-bottom:24px;">
      Acesse sua conta AgroTech
    </p>

    {% if erro %}
      <div style="background:#ffdddd; border:1px solid #d9534f; border-radius:8px; padding:10px 14px; color:#a11722; font-size:0.9rem; margin-bottom:16px;">
        {{ erro }}
      </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}" style="display:flex; flex-direction:column; gap:14px;">
      {% csrf_token %}
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div>
        <label style="display:block; font-size:0.78rem; font-weight:700; color:#264433; margin-bottom:5px;">USUÁRIO</label>
        <input type="text" name="username" value="{{ username|default:'' }}"
               placeholder="Seu nome de usuário" required autofocus autocomplete="username"
               style="width:100%; padding:10px 13px; border-radius:9px; border:1px solid #bcd2bd; background:#fff; font-size:0.95rem; color:#16261b; outline:none; box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block; font-size:0.78rem; font-weight:700; color:#264433; margin-bottom:5px;">SENHA</label>
        <input type="password" name="password"
               placeholder="Sua senha" required autocomplete="current-password"
               style="width:100%; padding:10px 13px; border-radius:9px; border:1px solid #bcd2bd; background:#fff; font-size:0.95rem; color:#16261b; outline:none; box-sizing:border-box;">
      </div>
      <button type="submit"
              style="background:#28a745; color:#fff; border:none; border-radius:50px; padding:12px; font-size:0.97rem; font-weight:700; cursor:pointer; margin-top:4px; transition:background .2s;"
              onmouseover="this.style.background='#20913b'" onmouseout="this.style.background='#28a745'">
        Entrar
      </button>
    </form>

    <p style="text-align:center; margin-top:18px; font-size:0.9rem; color:#3f5a47;">
      Não tem conta?
      <a href="{% url 'cadastro' %}" style="color:#176b2c; font-weight:800;">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock content %}
