{% extends "global/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="justify-content:center; max-width:420px; margin-top:110px;">
  <div style="width:100%;">
    <h1 style="text-align:center; margin-bottom:6px; font-size:1.4rem;">Entrar</h1>
    <p style="text-align:center; color:rgba(255,255,255,0.65); font-size:0.88rem; margin-bottom:24px;">
      Acesse sua conta AgroTech
    </p>

    {% if erro %}
      <div style="background:rgba(220,53,69,0.20); border:1px solid rgba(220,53,69,0.40); border-radius:8px; padding:10px 14px; color:#ff8a8a; font-size:0.88rem; margin-bottom:16px;">
        {{ erro }}
      </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}" style="display:flex; flex-direction:column; gap:14px;">
      {% csrf_token %}
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div>
        <label style="display:block; font-size:0.78rem; font-weight:700; color:rgba(255,255,255,0.60); margin-bottom:5px;">USUÁRIO</label>
        <input type="text" name="username" value="{{ username|default:'' }}"
               placeholder="Seu nome de usuário" required autofocus autocomplete="username"
               style="width:100%; padding:10px 13px; border-radius:9px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.09); font-size:0.93rem; color:#fff; outline:none; box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block; font-size:0.78rem; font-weight:700; color:rgba(255,255,255,0.60); margin-bottom:5px;">SENHA</label>
        <input type="password" name="password"
               placeholder="Sua senha" required autocomplete="current-password"
               style="width:100%; padding:10px 13px; border-radius:9px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.09); font-size:0.93rem; color:#fff; outline:none; box-sizing:border-box;">
      </div>
      <button type="submit"
              style="background:#28a745; color:#fff; border:none; border-radius:50px; padding:12px; font-size:0.97rem; font-weight:700; cursor:pointer; margin-top:4px; transition:background .2s;"
              onmouseover="this.style.background='#20913b'" onmouseout="this.style.background='#28a745'">
        Entrar
      </button>
    </form>

    <p style="text-align:center; margin-top:18px; font-size:0.88rem; color:rgba(255,255,255,0.60);">
      Não tem conta?
      <a href="{% url 'cadastro' %}" style="color:#b2dfcc; font-weight:700;">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock content %}
