{% extends "global/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="justify-content:center;">
  <div style="width:100%; max-width:380px;">
    <h1 style="text-align:center; margin-bottom:24px;">Cadastro</h1>

    {% if form.errors %}
      <div class="form-error">Verifique os campos e tente novamente.</div>
    {% endif %}

    <form method="post" action="{% url 'cadastro' %}" style="display:flex; flex-direction:column; gap:14px;">
      {% csrf_token %}
      <div class="form-grupo" style="margin-bottom:0;">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Escolha um usuário" required
               style="max-width:100%; width:100%; padding:10px; border-radius:8px; border:none; font-size:1rem; color:#2d2d2d;">
      </div>
      <div class="form-grupo" style="margin-bottom:0;">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required
               style="max-width:100%; width:100%; padding:10px; border-radius:8px; border:none; font-size:1rem; color:#2d2d2d;">
      </div>
      <div class="form-grupo" style="margin-bottom:0;">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Crie uma senha" required
               style="max-width:100%; width:100%; padding:10px; border-radius:8px; border:none; font-size:1rem; color:#2d2d2d;">
      </div>
      <button type="submit" style="margin-top:8px;">CADASTRAR</button>
    </form>

    <p style="text-align:center; margin-top:16px; font-size:0.9rem;">
      Já tem conta? <a href="{% url 'login' %}" style="color:#b2dfcc; font-weight:bold;">Entrar</a>
    </p>
  </div>
</div>
{% endblock content %}
